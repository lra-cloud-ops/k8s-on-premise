apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-lracloudops
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-lracloudops
  template:
    metadata:
      labels:
        app: nginx-lracloudops
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-lracloudops
  namespace: default
spec:
  selector:
    app: nginx-lracloudops
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-lracloudops
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: nginx-lracloudops.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-lracloudops
            port:
              number: 80
